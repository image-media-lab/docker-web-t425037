<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webデザイン - 第3回</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Docker Web Server 起動中!</h1>
    </header>

    <main>
        <section class="card">
            <h2>API連携テスト（犬の画像）</h2>
            <p>サーバー経由で外部データを取得する練習です。</p>
            <div id="image-container">
                <img id="dog-img" src="" alt="ここにかわいい犬が表示されます">
            </div>
            <button id="update-btn">画像を更新する</button>
        </section>
    </main>

    <script>
        // ボタンを押すと犬の画像を取得する関数
        async function fetchDog() {
            try {
                const response = await fetch('https://dog.ceo/api/breeds/image/random');
                const data = await response.json();
                document.getElementById('dog-img').src = data.message;
            } catch (error) {
                console.error("データの取得に失敗しました:", error);
            }
        }

        document.getElementById('update-btn').addEventListener('click', fetchDog);
        fetchDog(); // 初回起動時にも実行
    </script>
</body>
</html>
